name: Daily Data Extraction

on:
  # 允许手动触发
  workflow_dispatch:

jobs:
  extract-and-export:
    runs-on: ubuntu-latest
    
    steps:
      # 第一步：检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 第二步：安装 Python    
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # 第三步：安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 第四步：运行提取脚本
      - name: Run extraction workflow
        env:
          # 使用 GitHub Secrets 保存敏感信息
          TARGET_USERNAME: ${{ secrets.TARGET_USERNAME }}
          TARGET_PASSWORD: ${{ secrets.TARGET_PASSWORD }}
          TARGET_URL: ${{ secrets.TARGET_URL }}
        run: |
          python auto_workflow.py
      
      # 第五步：上传导出的数据为构件
      - name: Upload extracted data
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: extracted-data-${{ github.run_id }}
          path: downloads/
          retention-days: 30
      
      # 第六步：将数据提交到仓库（可选）
      - name: Commit and push data to repository
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add downloads/ || true
          git commit -m "��� Auto: Data extraction on $(date +%Y-%m-%d\ %H:%M:%S)" || true
          git push || true
      
      # 错误处理
      - name: Handle failure
        if: failure()
        run: |
          echo "❌ Workflow failed"
          exit 1
